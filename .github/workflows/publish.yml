name: Publish package

on:
    workflow_dispatch:
        inputs:
            publish_to_npm:
                description: "Publish package to NPM"
                required: false
                type: boolean
                default: true
            publish_to_jsr:
                description: "Publish package to JSR"
                required: false
                type: boolean
                default: true
            npm_tag:
                description: "NPM dist-tag (latest | beta | next | …)"
                required: false
                type: string
                default: "latest"
            github_release_prerelease:
                description: "Mark GitHub release as prerelease"
                required: false
                type: boolean
                default: false

permissions:
    contents: write
    id-token: write

jobs:
    publish_package:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.11

            - name: Setup Node (for npm publish auth)
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  registry-url: "https://registry.npmjs.org"

            - id: changelog
              name: Generate changelog
              run: bun scripts/generate-changelog.ts

            - name: Install modules
              run: bun install

            - name: Prepare to JSR publish
              run: bun scripts/release-jsr.ts

            - name: Type-check
              run: tsc --noEmit

            - name: Publish package to JSR
              if: ${{ github.event.inputs.publish_to_jsr }}
              run: bunx jsr publish --allow-dirty --allow-slow-types

            - name: Publish package to NPM
              if: ${{ github.event.inputs.publish_to_npm }}
              run: npm publish --access public --tag ${{ github.event.inputs.npm_tag }}
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: GitHub Release
              uses: ncipollo/release-action@v1
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  tag: v${{ steps.changelog.outputs.version }}
                  name: v${{ steps.changelog.outputs.version }}
                  body: ${{ steps.changelog.outputs.changelog }}
                  draft: false
                  prerelease: ${{ github.event.inputs.github_release_prerelease == 'true' }}
                  generateReleaseNotes: true
